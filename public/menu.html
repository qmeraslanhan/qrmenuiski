<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#312e81">
  <title>Menü</title>
  <meta name="description" content="Dijital menü — tüm ürünler ve fiyatlar.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Dijital Menü">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }

    /* ── Theme variables ───────────────────────────────── */
    :root {
      --t-from:   #312e81;
      --t-mid:    #3730a3;
      --t-to:     #4338ca;
      --t-accent: #4f46e5;
      --t-light:  #eef2ff;
      --t-muted:  #c7d2fe;
    }

    /* ── Scrollbar hide ────────────────────────────────── */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Hero gradient ─────────────────────────────────── */
    .hero-bg {
      background: linear-gradient(145deg, var(--t-from) 0%, var(--t-mid) 50%, var(--t-to) 100%);
    }

    /* ── Decorative glow blobs ─────────────────────────── */
    .blob { position: absolute; border-radius: 50%; pointer-events: none; }

    /* ── Wave divider ──────────────────────────────────── */
    .wave {
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 44px;
      background: #f8fafc;
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    /* ── Tab bar ───────────────────────────────────────── */
    .tab-bar {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .tab-pill {
      transition: all 0.22s cubic-bezier(.4,0,.2,1);
      white-space: nowrap;
    }
    .tab-pill.active {
      background: var(--t-accent);
      color: #fff;
      box-shadow: 0 2px 14px rgba(79,70,229,0.3);
    }
    .tab-pill:not(.active) {
      background: #f1f5f9;
      color: #64748b;
    }
    .tab-pill:not(.active):active { transform: scale(0.93); }

    /* ── Section heading accent ────────────────────────── */
    .cat-accent { background: var(--t-accent); }

    /* ── Product cards ─────────────────────────────────── */
    .product-card {
      animation: cardIn 0.38s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-img {
      aspect-ratio: 16/9;
      overflow: hidden;
      background: linear-gradient(135deg, #e2e8f0, #f1f5f9);
    }
    .card-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.35s ease;
    }
    .product-card:active .card-img img { transform: scale(1.04); }

    .price-badge {
      display: inline-flex; align-items: center;
      background: var(--t-light);
      color: var(--t-accent);
      font-weight: 700;
      border-radius: 9999px;
      padding: 2px 10px;
      font-size: 13px;
    }

    .no-img-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: var(--t-light);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── QR FAB ────────────────────────────────────────── */
    .qr-fab {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .qr-fab:active { transform: scale(0.91); }

    /* ── Loading spinner ───────────────────────────────── */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--t-accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Clamp ─────────────────────────────────────────── */
    .clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Loading -->
  <div id="loading" class="min-h-screen flex flex-col items-center justify-center gap-4">
    <div class="spinner"></div>
    <p class="text-slate-400 text-sm tracking-wide">Menü hazırlanıyor…</p>
  </div>

  <!-- Error -->
  <div id="error" class="hidden min-h-screen flex flex-col items-center justify-center gap-4 px-8 text-center">
    <div class="w-20 h-20 rounded-3xl bg-slate-100 flex items-center justify-center text-4xl mb-2">🍽️</div>
    <h2 class="text-xl font-bold text-slate-700">Menü Bulunamadı</h2>
    <p class="text-sm text-slate-400 max-w-xs leading-relaxed">Bu bağlantı geçerli bir menüye yönlendirmiyor. Lütfen QR kodu tekrar okutun.</p>
  </div>

  <!-- App -->
  <div id="app" class="hidden max-w-lg mx-auto">

    <!-- Hero -->
    <div class="hero-bg relative overflow-hidden">
      <div class="blob w-56 h-56 -top-16 -right-16 opacity-10" style="background:radial-gradient(circle,#fff,transparent)"></div>
      <div class="blob w-40 h-40 -bottom-10 -left-10 opacity-10" style="background:radial-gradient(circle,#fff,transparent)"></div>

      <div class="relative z-10 pt-12 pb-16 px-6 text-center">
        <div class="mb-5 flex justify-center">
          <img id="facilityLogo" src="" alt=""
            class="hidden w-24 h-24 rounded-3xl object-cover shadow-2xl ring-4 ring-white/25">
          <div id="facilityInitial"
            class="w-24 h-24 rounded-3xl bg-white/15 backdrop-blur-sm flex items-center justify-center text-4xl font-bold text-white/80 ring-4 ring-white/20 shadow-2xl"></div>
        </div>
        <h1 id="facilityName" class="text-2xl font-bold text-white leading-tight tracking-tight"></h1>
        <p id="facilityDesc" class="hidden text-sm text-white/65 mt-2 leading-relaxed max-w-xs mx-auto"></p>
        <div id="facilityInfo" class="hidden flex flex-wrap items-center justify-center gap-x-3 gap-y-1.5 text-xs text-white/70 mt-3"></div>
      </div>

      <div class="wave"></div>
    </div>

    <!-- Sticky tabs + search -->
    <div class="sticky top-0 z-30 tab-bar">
      <div class="px-4 pt-3">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input id="searchInput" type="search" placeholder="Ürün ara…" aria-label="Ürün ara"
            class="w-full bg-slate-100 border border-slate-200 rounded-full pl-9 pr-9 py-2 text-sm outline-none focus:border-slate-300 transition">
          <button id="searchClear" onclick="clearSearch()" aria-label="Aramayı temizle"
            class="hidden absolute right-2 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-slate-200 hover:bg-slate-300 flex items-center justify-center text-slate-600 text-xs">×</button>
        </div>
      </div>
      <div id="tabs" class="no-scrollbar flex gap-2 px-4 py-3 overflow-x-auto"></div>
    </div>

    <!-- Sections -->
    <div id="sections" class="px-4 pt-6 pb-10 space-y-10"></div>
    <div id="searchEmpty" class="hidden px-6 py-12 text-center">
      <div class="text-5xl mb-3">🔍</div>
      <p class="text-sm text-slate-500">Aramanızla eşleşen ürün bulunamadı.</p>
    </div>

    <!-- Institutional footer -->
    <footer class="px-6 pt-8 pb-28 border-t border-slate-100 bg-white">
      <div class="flex items-center justify-center gap-6">
        <img src="/img/iski-logo.png" alt="İSKİ" class="h-12 w-auto object-contain">
        <div class="w-px h-10 bg-slate-200"></div>
        <img src="/img/ibb-mavi.png" alt="İstanbul Büyükşehir Belediyesi" class="h-12 w-auto object-contain">
      </div>
    </footer>

  </div>

  <!-- QR FAB -->
  <button id="qrBtn" onclick="openQRModal()"
    class="hidden qr-fab fixed bottom-6 right-4 z-40 rounded-2xl p-2.5">
    <img id="qrThumb" src="" alt="QR" class="w-11 h-11 rounded-xl">
    <p class="text-[10px] text-slate-400 text-center mt-1 font-semibold tracking-wide">QR</p>
  </button>

  <!-- QR Modal -->
  <div id="qrModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4"
    style="background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);"
    onclick="closeQRModal()">
    <div class="bg-white rounded-3xl p-7 w-full max-w-xs text-center shadow-2xl" onclick="event.stopPropagation()">
      <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto mb-5"></div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Menü QR Kodu</p>
      <img id="qrModalImg" src="" alt="QR" class="w-52 h-52 mx-auto rounded-2xl border border-slate-100 shadow-sm mb-4">
      <p id="qrModalUrl" class="text-xs text-slate-400 break-all mb-5 leading-relaxed"></p>
      <div class="flex gap-3">
        <button onclick="closeQRModal()"
          class="flex-1 py-3 rounded-2xl text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">Kapat</button>
        <a id="qrDownload" href="#" download="menu-qr.png"
          class="flex-1 py-3 rounded-2xl text-sm font-semibold text-white hover:opacity-90 transition-opacity text-center"
          style="background:var(--t-accent)">İndir</a>
      </div>
    </div>
  </div>

  <script>
    const slug = location.pathname.replace(/\/$/, '').split('/').pop();

    const PRESETS = {
      '#4f46e5': { from:'#312e81', mid:'#3730a3', to:'#4338ca', accent:'#4f46e5', light:'#eef2ff', muted:'#c7d2fe', meta:'#312e81' },
      '#d97706': { from:'#78350f', mid:'#92400e', to:'#b45309', accent:'#d97706', light:'#fffbeb', muted:'#fde68a', meta:'#78350f' },
      '#059669': { from:'#064e3b', mid:'#065f46', to:'#047857', accent:'#059669', light:'#ecfdf5', muted:'#a7f3d0', meta:'#064e3b' },
      '#e11d48': { from:'#881337', mid:'#9f1239', to:'#be123c', accent:'#e11d48', light:'#fff1f2', muted:'#fecdd3', meta:'#881337' },
      '#7c3aed': { from:'#3b0764', mid:'#4c1d95', to:'#5b21b6', accent:'#7c3aed', light:'#f5f3ff', muted:'#ddd6fe', meta:'#3b0764' },
      '#0284c7': { from:'#0c4a6e', mid:'#075985', to:'#0369a1', accent:'#0284c7', light:'#f0f9ff', muted:'#bae6fd', meta:'#0c4a6e' },
    };

    function applyTheme(color) {
      const t = PRESETS[color] || PRESETS['#4f46e5'];
      const r = document.documentElement.style;
      r.setProperty('--t-from',   t.from);
      r.setProperty('--t-mid',    t.mid);
      r.setProperty('--t-to',     t.to);
      r.setProperty('--t-accent', t.accent);
      r.setProperty('--t-light',  t.light);
      r.setProperty('--t-muted',  t.muted);
      document.querySelector('meta[name=theme-color]').content = t.meta;
    }

    async function loadMenu() {
      try {
        const res = await fetch(`/api/menu/${encodeURIComponent(slug)}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        if (data.facility.theme_color) applyTheme(data.facility.theme_color);
        render(data);
      } catch {
        hide('loading'); show('error');
      }
    }

    function render({ facility, categories, qrCode, menuUrl }) {
      document.title = `${facility.name} — Menü`;

      if (facility.logo_url) {
        const img = document.getElementById('facilityLogo');
        img.src = facility.logo_url;
        img.classList.remove('hidden');
        document.getElementById('facilityInitial').classList.add('hidden');
      } else {
        document.getElementById('facilityInitial').textContent = facility.name[0].toUpperCase();
      }
      document.getElementById('facilityName').textContent = facility.name;
      if (facility.description) {
        const d = document.getElementById('facilityDesc');
        d.textContent = facility.description;
        d.classList.remove('hidden');
      }

      // İletişim ve saat bilgisi
      const infoBits = [];
      if (facility.hours_text) infoBits.push(`<span class="inline-flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        ${esc(facility.hours_text)}
      </span>`);
      if (facility.phone) infoBits.push(`<a href="tel:${esc(facility.phone.replace(/\s+/g,''))}" class="inline-flex items-center gap-1.5 hover:text-white transition">
        <svg class="w-3.5 h-3.5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        ${esc(facility.phone)}
      </a>`);
      if (infoBits.length) {
        const info = document.getElementById('facilityInfo');
        info.innerHTML = infoBits.join('<span class="opacity-40">•</span>');
        info.classList.remove('hidden');
      }

      document.getElementById('qrThumb').src = qrCode;
      document.getElementById('qrModalImg').src = qrCode;
      document.getElementById('qrModalUrl').textContent = menuUrl;
      document.getElementById('qrDownload').href = qrCode;
      document.getElementById('qrBtn').classList.remove('hidden');

      if (!categories.length) {
        document.getElementById('sections').innerHTML =
          `<div class="text-center py-20">
             <div class="text-5xl mb-4">🍽️</div>
             <p class="text-sm text-slate-400">Henüz ürün eklenmemiş.</p>
           </div>`;
        hide('loading'); show('app');
        return;
      }

      document.getElementById('tabs').innerHTML = categories.map((cat, i) => `
        <button id="tab-${cat.id}" onclick="scrollToSection(${cat.id})"
          class="tab-pill shrink-0 px-4 py-1.5 rounded-full text-xs font-semibold ${i === 0 ? 'active' : ''}">
          ${esc(cat.name)}
        </button>
      `).join('');

      document.getElementById('sections').innerHTML = categories.map(cat => {
        const grid = cat.products.some(p => !!p.image_url);
        return `
          <section id="sec-${cat.id}" class="scroll-mt-[52px]">
            <div class="flex items-center gap-2.5 mb-4">
              <span class="w-1 h-6 cat-accent rounded-full shrink-0"></span>
              <h2 class="font-bold text-slate-800 text-base">${esc(cat.name)}</h2>
              <span class="ml-auto text-xs text-slate-400 font-medium">${cat.products.length} ürün</span>
            </div>
            <div class="${grid ? 'grid grid-cols-2 gap-3' : 'space-y-2.5'}">
              ${cat.products.map((p, idx) => grid ? renderGrid(p, idx) : renderRow(p, idx)).join('')}
            </div>
          </section>`;
      }).join('');

      hide('loading'); show('app');
      initScrollSpy(categories);
    }

    function searchAttr(p) {
      return `data-product data-search="${esc((p.name + ' ' + (p.description || '')).toLowerCase())}"`;
    }

    function renderGrid(p, idx) {
      const hasImg = !!p.image_url;
      return `
        <div ${searchAttr(p)} class="product-card bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100/80 hover:shadow-md transition-shadow" style="animation-delay:${idx*0.05}s">
          <div class="card-img">
            ${hasImg
              ? `<img src="${p.image_url}" alt="${esc(p.name)}" loading="lazy">`
              : `<div class="w-full h-full flex items-center justify-center">
                   <svg class="w-8 h-8 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
                     <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                   </svg>
                 </div>`}
          </div>
          <div class="p-3 flex flex-col gap-1.5">
            <h3 class="font-semibold text-slate-900 text-sm leading-snug clamp-2">${esc(p.name)}</h3>
            ${p.description ? `<p class="text-xs text-slate-400 leading-relaxed clamp-2">${esc(p.description)}</p>` : ''}
            <span class="price-badge self-start mt-0.5">${fmtPrice(p.price)}</span>
          </div>
        </div>`;
    }

    function renderRow(p, idx) {
      return `
        <div ${searchAttr(p)} class="product-card bg-white rounded-2xl flex items-center gap-4 p-4 shadow-sm border border-slate-100/80 hover:shadow-md transition-shadow" style="animation-delay:${idx*0.05}s">
          <div class="no-img-icon">
            <svg class="w-6 h-6" style="color:var(--t-muted)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="font-semibold text-slate-900 text-sm leading-snug">${esc(p.name)}</h3>
            ${p.description ? `<p class="text-xs text-slate-400 mt-0.5 leading-relaxed clamp-2">${esc(p.description)}</p>` : ''}
          </div>
          <span class="price-badge shrink-0">${fmtPrice(p.price)}</span>
        </div>`;
    }

    function scrollToSection(catId) {
      const el = document.getElementById(`sec-${catId}`);
      if (!el) return;
      const bar = document.querySelector('.tab-bar');
      const offset = bar ? bar.offsetHeight : 52;
      const top = el.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({ top, behavior: 'smooth' });
    }

    function setActiveTab(catId) {
      document.querySelectorAll('[id^="tab-"]').forEach(btn => {
        const active = btn.id === `tab-${catId}`;
        btn.classList.toggle('active', active);
        if (active) btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });
    }

    function initScrollSpy(categories) {
      const observer = new IntersectionObserver(entries => {
        const visible = entries.filter(e => e.isIntersecting);
        if (!visible.length) return;
        const top = visible.reduce((a, b) =>
          a.boundingClientRect.top < b.boundingClientRect.top ? a : b);
        setActiveTab(top.target.id.replace('sec-', ''));
      }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });

      categories.forEach(cat => {
        const el = document.getElementById(`sec-${cat.id}`);
        if (el) observer.observe(el);
      });
    }

    function openQRModal()  { document.getElementById('qrModal').classList.remove('hidden'); }
    function closeQRModal() { document.getElementById('qrModal').classList.add('hidden'); }

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const fmtPrice = p => Number(p) > 0 ? `${Number(p).toFixed(2)} ₺` : 'Ücretsiz';

    // ── SEARCH ────────────────────────────────────────────────
    function applySearch() {
      const input = document.getElementById('searchInput');
      const q = input.value.trim().toLowerCase();
      document.getElementById('searchClear').classList.toggle('hidden', !q);

      const sections = document.querySelectorAll('#sections section');
      let anyVisible = false;

      sections.forEach(sec => {
        const products = sec.querySelectorAll('[data-product]');
        let visibleCount = 0;
        products.forEach(p => {
          const text = (p.getAttribute('data-search') || '').toLowerCase();
          const match = !q || text.includes(q);
          p.style.display = match ? '' : 'none';
          if (match) visibleCount++;
        });
        sec.style.display = (visibleCount > 0 || !q) ? '' : 'none';
        if (visibleCount > 0) anyVisible = true;
      });

      document.getElementById('searchEmpty').classList.toggle('hidden', anyVisible || !q);
    }
    function clearSearch() {
      const input = document.getElementById('searchInput');
      input.value = '';
      applySearch();
      input.focus();
    }
    document.getElementById('searchInput').addEventListener('input', applySearch);

    loadMenu();
  </script>
</body>
</html>
