<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Fiyat Listesi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @page { size: A3 landscape; margin: 0; }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    :root {
      --theme:       #1e293b;
      --theme-soft:  #334155;
      --gold:        #b8860b;
      --gold-light:  #d4a843;
      --paper:       #faf6ed;
      --paper-warm:  #f5efdf;
      --ink:         #1a1a1a;
      --ink-soft:    #5b5b5b;
      --line:        #c9bf9c;
      --line-soft:   #e5dcc1;
    }

    html, body {
      background:
        radial-gradient(circle at 20% 10%, rgba(184,134,11,0.04), transparent 50%),
        radial-gradient(circle at 80% 90%, rgba(30,41,59,0.03), transparent 50%),
        var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', Arial, sans-serif;
    }
    body {
      padding: 14mm 16mm;
      min-height: 100vh;
      position: relative;
    }

    /* Dekoratif çerçeve */
    .frame-outer {
      position: absolute;
      inset: 8mm;
      border: 1px solid var(--line);
      pointer-events: none;
    }
    .frame-inner {
      position: absolute;
      inset: 9.5mm;
      border: 1px solid var(--line-soft);
      pointer-events: none;
    }
    /* Köşe ornamentleri */
    .corner {
      position: absolute;
      width: 14mm; height: 14mm;
      pointer-events: none;
    }
    .corner.tl { top: 6.5mm; left: 6.5mm; }
    .corner.tr { top: 6.5mm; right: 6.5mm; transform: scaleX(-1); }
    .corner.bl { bottom: 6.5mm; left: 6.5mm; transform: scaleY(-1); }
    .corner.br { bottom: 6.5mm; right: 6.5mm; transform: scale(-1, -1); }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--gold);
    }
    .corner::before { top: 0; left: 0; width: 6mm; height: 1px; }
    .corner::after  { top: 0; left: 0; width: 1px; height: 6mm; }

    /* ── HEADER ───────────────────────────────────────────────── */
    .header {
      text-align: center;
      padding: 6px 0 14px;
      margin-bottom: 8px;
    }
    .header-tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 8px;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      font-weight: 800;
      color: var(--theme);
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .header-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-style: italic;
      color: var(--ink-soft);
      font-weight: 500;
      max-width: 500px;
      margin: 0 auto;
      letter-spacing: 0.5px;
    }

    .ornament {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      margin: 10px auto 8px;
    }
    .ornament-line {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .ornament-diamond {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
    }
    .ornament-circle {
      width: 4px; height: 4px;
      border: 1px solid var(--gold);
      border-radius: 50%;
    }

    /* ── COLUMNS ──────────────────────────────────────────────── */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22mm;
      align-items: start;
      padding: 0 6mm;
    }

    /* ── CATEGORY ─────────────────────────────────────────────── */
    .category {
      break-inside: avoid;
      page-break-inside: avoid;
      margin-bottom: 18px;
    }
    .cat-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--theme);
      text-align: center;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 6px;
      position: relative;
    }
    .cat-title::after {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 6px auto 0;
    }

    /* ── PRODUCT ──────────────────────────────────────────────── */
    .product-row {
      padding: 4px 0;
    }
    .product-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .product-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.4px;
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .product-dots {
      flex: 1;
      border-bottom: 1px dotted #a89a72;
      transform: translateY(-4px);
      min-width: 20px;
    }
    .product-price {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--theme);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .product-desc {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-style: italic;
      color: var(--ink-soft);
      font-weight: 500;
      margin-top: 2px;
      padding-right: 30px;
      line-height: 1.3;
      letter-spacing: 0.2px;
    }

    /* ── FOOTER ───────────────────────────────────────────────── */
    .footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--line-soft);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
      padding-left: 6mm;
      padding-right: 6mm;
    }
    .footer-side {
      display: flex;
      align-items: center;
    }
    .footer-side.left  { justify-content: flex-start; }
    .footer-side.right { justify-content: flex-end; }

    .institution-logo {
      height: 70px;
      width: auto;
      max-width: 160px;
      object-fit: contain;
    }

    .footer-center {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .qr-box {
      background: #fff;
      padding: 5px;
      border: 1px solid var(--line);
      box-shadow: 0 2px 6px rgba(0,0,0,.05);
    }
    .qr-box img {
      display: block;
      width: 72px;
      height: 72px;
    }
    .qr-info {
      text-align: left;
      max-width: 180px;
    }
    .qr-info strong {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      color: var(--theme);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .qr-info p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      font-style: italic;
      color: var(--ink-soft);
      letter-spacing: 0.3px;
      line-height: 1.3;
      margin: 0;
    }
    .qr-info .brand {
      display: block;
      margin-top: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--gold);
      font-weight: 600;
      text-transform: uppercase;
    }

    /* ── TOOLBAR (ekran) ──────────────────────────────────────── */
    .toolbar {
      position: fixed;
      top: 16px; right: 16px;
      z-index: 100;
      display: flex; gap: 8px;
    }
    .tb-btn {
      background: var(--theme);
      color: #fff;
      border: none;
      padding: 11px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(30,41,59,.25);
      transition: all .2s;
    }
    .tb-btn:hover { background: var(--theme-soft); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(30,41,59,.3); }
    .tb-btn.secondary {
      background: #fff;
      color: var(--theme);
      border: 1px solid var(--line);
    }
    .tb-btn.secondary:hover {
      background: var(--paper-warm);
    }

    /* ── STATES ───────────────────────────────────────────────── */
    .state {
      padding: 100px 20px;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--ink-soft);
      letter-spacing: 0.5px;
    }
    .state.error { color: #991b1b; }

    /* ── PRINT ────────────────────────────────────────────────── */
    @media print {
      .toolbar { display: none; }
      body { padding: 10mm 12mm; }
      .frame-outer { inset: 5mm; }
      .frame-inner { inset: 6.5mm; }
      .corner.tl, .corner.tr { top: 3.5mm; }
      .corner.tl, .corner.bl { left: 3.5mm; }
      .corner.tr, .corner.br { right: 3.5mm; }
      .corner.bl, .corner.br { bottom: 3.5mm; }
    }
  </style>
</head>
<body>

  <div class="frame-outer"></div>
  <div class="frame-inner"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="toolbar">
    <button class="tb-btn" onclick="window.print()">PDF İndir</button>
    <button class="tb-btn secondary" onclick="window.close()">Kapat</button>
  </div>

  <div id="content"><div class="state">Hazırlanıyor…</div></div>

  <script>
    // URL: /qr-menu/print/<slug> (path) veya legacy /print-menu.html?slug=<slug>
    const slug = new URLSearchParams(location.search).get('slug')
      || location.pathname.replace(/\/$/, '').split('/').pop();

    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    function fmtPrice(p) {
      const n = Number(p) || 0;
      return n.toLocaleString('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function renderState(msg, isError) {
      document.getElementById('content').innerHTML = `<div class="state${isError ? ' error' : ''}">${esc(msg)}</div>`;
    }

    async function load() {
      if (!slug) { renderState('URL\'de slug belirtilmemiş.', true); return; }
      try {
        const res = await fetch('/api/menu/' + encodeURIComponent(slug));
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'HTTP ' + res.status);
        }
        const data = await res.json();
        render(data);
      } catch (e) {
        renderState('Veri yüklenemedi: ' + e.message, true);
      }
    }

    function splitColumns(categories) {
      const weights = categories.map(c => (c.products || []).length + 1.8);
      const sum = weights.reduce((a, b) => a + b, 0);
      const half = sum / 2;
      let acc = 0, split = categories.length;
      for (let i = 0; i < categories.length; i++) {
        if (acc + weights[i] / 2 >= half) { split = i; break; }
        acc += weights[i];
      }
      if (split === 0) split = 1;
      if (split >= categories.length) split = categories.length - 1;
      return [categories.slice(0, split), categories.slice(split)];
    }

    function renderProduct(p) {
      const desc = p.description ? `<div class="product-desc">${esc(p.description)}</div>` : '';
      return `
        <div class="product-row">
          <div class="product-line">
            <span class="product-name">${esc(p.name)}</span>
            <span class="product-dots"></span>
            <span class="product-price">${fmtPrice(p.price)} ₺</span>
          </div>
          ${desc}
        </div>
      `;
    }

    function renderCategory(cat) {
      const products = (cat.products || []).map(renderProduct).join('');
      return `
        <div class="category">
          <div class="cat-title">${esc(cat.name)}</div>
          ${products}
        </div>
      `;
    }

    function render(data) {
      const themeColor = data.facility.theme_color || '#1e293b';
      document.documentElement.style.setProperty('--theme', themeColor);
      document.documentElement.style.setProperty('--theme-soft', themeColor);
      document.title = data.facility.name + ' — Fiyat Listesi';

      const cats = (data.categories || []).filter(c => (c.products || []).length > 0);
      if (cats.length === 0) {
        document.getElementById('content').innerHTML = `
          <div class="header">
            <div class="header-tag">Menü &amp; Fiyat Listesi</div>
            <h1 class="header-title">${esc(data.facility.name)}</h1>
            <div class="ornament">
              <span class="ornament-line"></span>
              <span class="ornament-diamond"></span>
              <span class="ornament-line"></span>
            </div>
          </div>
          <div class="state" style="padding:140px 20px;">
            <div style="font-family:'Playfair Display',serif;font-size:22px;color:var(--theme);margin-bottom:12px;letter-spacing:1px;">Menü Henüz Hazırlanıyor</div>
            <div style="font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-soft);font-size:14px;max-width:480px;margin:0 auto;line-height:1.5;">
              Bu tesise ait kategoriler veya ürünler henüz girilmemiş.<br>
              Admin panelinden ekleme yaptıktan sonra fiyat listesi otomatik oluşturulacaktır.
            </div>
          </div>
        `;
        return;
      }

      const cols = splitColumns(cats);

      const centerSection = data.qrCode ? `
        <div class="qr-box"><img src="${esc(data.qrCode)}" alt="QR"></div>
        <div class="qr-info">
          <strong>Dijital Menü</strong>
          <p>Kareyi taratarak güncel menüye ulaşın</p>
          <span class="brand">${esc(data.facility.name)} — QR Menü</span>
        </div>
      ` : `
        <div class="qr-info" style="text-align:center">
          <strong>${esc(data.facility.name)}</strong>
          <p>QR Menü</p>
        </div>
      `;

      const tagline = data.facility.description ? esc(data.facility.description) : 'Lezzet, geleneğin modern dokunuşuyla';

      document.getElementById('content').innerHTML = `
        <div class="header">
          <div class="header-tag">Menü &amp; Fiyat Listesi</div>
          <h1 class="header-title">${esc(data.facility.name)}</h1>
          <div class="ornament">
            <span class="ornament-line"></span>
            <span class="ornament-circle"></span>
            <span class="ornament-diamond"></span>
            <span class="ornament-circle"></span>
            <span class="ornament-line"></span>
          </div>
          <div class="header-sub">${tagline}</div>
        </div>

        <div class="columns">
          <div>${cols[0].map(renderCategory).join('')}</div>
          <div>${cols[1].map(renderCategory).join('')}</div>
        </div>

        <div class="footer">
          <div class="footer-side left">
            <img src="/img/iski-logo.png" alt="İSKİ" class="institution-logo">
          </div>
          <div class="footer-center">${centerSection}</div>
          <div class="footer-side right">
            <img src="/img/ibb-mavi.png" alt="İstanbul Büyükşehir Belediyesi" class="institution-logo">
          </div>
        </div>
      `;
    }

    load();
  </script>
</body>
</html>
