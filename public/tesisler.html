<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesisler — QR Menü</title>
  <meta name="description" content="İSKİ tesislerinin dijital menüleri. Menüsünü görmek istediğiniz tesisi seçin.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="canonical" href="https://omeraslanhan.com/tesisler.html">
  <meta property="og:title" content="İSKİ Tesisleri — QR Menü">
  <meta property="og:description" content="İSKİ tesislerinin dijital menülerine hızlı erişim.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://omeraslanhan.com/">
  <meta property="og:site_name" content="İSKİ QR Menü">
  <meta name="theme-color" content="#312e81">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    body { background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#4f46e5 100%); min-height:100vh; }
    .card-hover { transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,.35); border-color: rgba(245,158,11,.55); }
    .logo-fallback { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
  </style>
</head>
<body class="py-10 px-4">

  <div class="max-w-6xl mx-auto">

    <!-- Header -->
    <header class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-amber-500 rounded-2xl shadow-lg mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-gray-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
        </svg>
      </div>
      <h1 class="text-3xl md:text-4xl font-bold text-white">Tesisler</h1>
      <p class="text-indigo-100 text-sm mt-2">Menüsünü görmek istediğiniz tesisi seçin</p>
    </header>

    <!-- Search -->
    <div id="searchWrap" class="hidden mb-6 max-w-md mx-auto">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-indigo-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input id="searchInput" type="search" placeholder="Tesis ara…" aria-label="Tesis ara"
          class="w-full bg-white/10 backdrop-blur-sm border border-white/20 text-white placeholder-indigo-200 rounded-full pl-9 pr-4 py-2.5 text-sm outline-none focus:border-amber-400/60 focus:bg-white/15 transition">
      </div>
    </div>

    <!-- States -->
    <div id="loading" class="text-center text-indigo-100 py-20" role="status" aria-live="polite">
      <div class="inline-block w-8 h-8 border-2 border-amber-400 border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-3 text-sm">Yükleniyor…</p>
    </div>

    <div id="empty" class="hidden text-center py-20">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/10 mb-4">
        <svg class="w-8 h-8 text-indigo-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
      </div>
      <h2 class="text-white text-lg font-semibold">Henüz tesis eklenmemiş</h2>
      <p class="text-indigo-200 text-sm mt-1">Admin panelinden tesis ekleyince burada listelenir.</p>
    </div>

    <div id="error" class="hidden text-center text-red-200 bg-red-900/30 border border-red-800/50 rounded-xl p-6 max-w-md mx-auto">
      Tesisler yüklenemedi. Lütfen daha sonra tekrar deneyin.
    </div>

    <!-- Grid -->
    <div id="grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>

    <!-- Footer link + institutional logos -->
    <div class="mt-12 flex flex-col items-center gap-3">
      <div class="bg-white rounded-2xl px-6 py-4 shadow-xl flex items-center justify-center gap-6">
        <img src="/img/iski-logo.png" alt="İSKİ" class="h-10 w-auto object-contain">
        <div class="w-px h-8 bg-slate-200"></div>
        <img src="/img/ibb-mavi.png" alt="İstanbul Büyükşehir Belediyesi" class="h-10 w-auto object-contain">
      </div>
      <a href="/login.html" class="text-indigo-200 hover:text-white text-xs underline-offset-4 hover:underline transition mt-2">Yönetim Paneli</a>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
      }[c]));
    }

    function renderCard(f) {
      const logo = f.logo_url
        ? `<img src="${escapeHtml(f.logo_url)}" alt="${escapeHtml(f.name)}" class="w-full h-full object-cover" onerror="this.parentElement.classList.add('logo-fallback'); this.remove();">`
        : `<span class="text-white text-2xl font-bold">${escapeHtml((f.name||'?').charAt(0).toUpperCase())}</span>`;

      const desc = f.description
        ? `<p class="text-gray-400 text-sm mt-1 line-clamp-2">${escapeHtml(f.description)}</p>`
        : '';

      return `
        <a href="/menu/${encodeURIComponent(f.slug)}"
           class="card-hover block bg-[#111] border border-[#2a2a2a] rounded-2xl p-5 shadow-xl">
          <div class="flex items-center gap-4">
            <div class="w-16 h-16 rounded-xl overflow-hidden flex items-center justify-center ${f.logo_url ? '' : 'logo-fallback'} flex-shrink-0">
              ${logo}
            </div>
            <div class="min-w-0 flex-1">
              <h3 class="text-white font-semibold text-lg truncate">${escapeHtml(f.name)}</h3>
              ${desc}
            </div>
            <svg class="w-5 h-5 text-gray-600 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </a>
      `;
    }

    let _all = [];

    function applySearch() {
      const q = ($('searchInput').value || '').trim().toLowerCase();
      const filtered = !q ? _all : _all.filter(f =>
        (f.name || '').toLowerCase().includes(q) ||
        (f.description || '').toLowerCase().includes(q)
      );
      if (filtered.length === 0) {
        $('grid').classList.add('hidden');
        $('empty').classList.remove('hidden');
      } else {
        $('empty').classList.add('hidden');
        $('grid').innerHTML = filtered.map(renderCard).join('');
        $('grid').classList.remove('hidden');
      }
    }

    async function load() {
      try {
        const res = await fetch('/api/menu');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const list = await res.json();

        $('loading').classList.add('hidden');

        if (!Array.isArray(list) || list.length === 0) {
          $('empty').classList.remove('hidden');
          return;
        }

        _all = list;
        // Sadece 4+ tesis varsa arama kutusu göster
        if (_all.length >= 4) $('searchWrap').classList.remove('hidden');

        applySearch();
      } catch (e) {
        $('loading').classList.add('hidden');
        $('error').classList.remove('hidden');
        console.error(e);
      }
    }

    $('searchInput').addEventListener('input', applySearch);

    load();
  </script>
</body>
</html>
