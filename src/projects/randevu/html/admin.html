<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Randevu Yönetimi</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="robots" content="noindex,nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg:#F5F1E8; --bg-soft:#EFE9DC; --surface:#FFFFFF; --ink:#2D2A26; --ink-soft:#5F584F; --ink-mute:#8A8275;
      --line:#E5DDD0; --line-strong:#D4C9B5; --accent:#0F4C81; --accent-soft:#2D6FA8; --accent-glow:rgba(15,76,129,0.08);
      --gold:#C9A961; --gold-dark:#A88847;
      --green:#0F7B4F; --green-bg:#E7F5EE; --amber:#9A6B00; --amber-bg:#FBF1DC; --red:#B91C1C; --red-bg:#FBE9E9;
    }
    * { font-family:'DM Sans',sans-serif; box-sizing:border-box; }
    body { background:var(--bg); color:var(--ink); }
    .serif { font-family:'Playfair Display',serif; }
    .card { background:var(--surface); border:1px solid var(--line); border-radius:16px; }
    .btn { display:inline-flex; align-items:center; gap:6px; font-weight:600; font-size:13px; border-radius:10px; padding:8px 14px; cursor:pointer; border:1px solid transparent; transition:all .15s; white-space:nowrap; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent-soft); }
    .btn-ghost { background:transparent; border-color:var(--line-strong); color:var(--ink-soft); }
    .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
    .btn-green { background:var(--green); color:#fff; } .btn-green:hover{ filter:brightness(1.08); }
    .btn-red { background:#fff; border-color:rgba(185,28,28,0.4); color:var(--red); } .btn-red:hover{ background:var(--red-bg); }
    .btn-sm { padding:6px 11px; font-size:12px; }
    .fld { width:100%; border:1px solid var(--line-strong); border-radius:10px; padding:10px 12px; font-size:14px; outline:none; background:#fff; color:var(--ink); transition:border-color .2s, box-shadow .2s; }
    .fld:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
    .lbl { font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; display:block; }
    .badge { font-size:10.5px; font-weight:700; letter-spacing:.03em; padding:3px 9px; border-radius:999px; white-space:nowrap; }
    .b-pending{ background:var(--amber-bg); color:var(--amber); } .b-approved{ background:var(--green-bg); color:var(--green); }
    .b-rejected{ background:var(--red-bg); color:var(--red); } .b-cancelled{ background:#EEE; color:#777; }
    .tab { font-weight:600; font-size:14px; padding:9px 4px; color:var(--ink-mute); border-bottom:2px solid transparent; cursor:pointer; transition:color .2s, border-color .2s; }
    .tab.active { color:var(--accent); border-color:var(--accent); }
    .chip { font-size:12.5px; font-weight:600; padding:7px 14px; border-radius:999px; border:1px solid var(--line-strong); color:var(--ink-soft); cursor:pointer; background:#fff; transition:all .15s; }
    .chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .overlay { position:fixed; inset:0; background:rgba(45,42,38,0.45); backdrop-filter:blur(2px); display:flex; align-items:flex-start; justify-content:center; padding:24px 16px; overflow-y:auto; z-index:50; }
    .modal { background:var(--surface); border-radius:18px; width:100%; max-width:560px; padding:24px; margin:auto; box-shadow:0 30px 60px -20px rgba(0,0,0,0.3); }
    .spinner { width:34px; height:34px; border:2px solid var(--line-strong); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .day-check { display:flex; align-items:center; gap:5px; font-size:13px; cursor:pointer; padding:6px 10px; border:1px solid var(--line-strong); border-radius:8px; user-select:none; }
    .day-check input { accent-color:var(--accent); }
    .hidden { display:none !important; }
    .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:11px 20px; border-radius:12px; font-size:13.5px; font-weight:500; box-shadow:0 12px 30px -10px rgba(0,0,0,0.5); z-index:80; opacity:0; transition:opacity .25s, transform .25s; pointer-events:none; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(-4px); }
  </style>
</head>
<body class="min-h-screen">
  <!-- Auth gate -->
  <div id="gate" class="min-h-screen flex items-center justify-center"><div class="spinner"></div></div>

  <div id="app" class="hidden max-w-5xl mx-auto px-4 md:px-6 py-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <img src="/img/iski-logo.png" alt="İSKİ" class="h-9 w-auto object-contain">
        <div>
          <h1 class="serif text-xl font-semibold leading-tight">Randevu Yönetimi</h1>
          <p class="text-xs" style="color:var(--ink-mute);">Randevu Sistemi</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <a href="/randevu" target="_blank" class="btn btn-ghost btn-sm">Siteyi Gör</a>
        <button onclick="logout()" class="btn btn-ghost btn-sm">Çıkış</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex items-center gap-6 border-b mb-6" style="border-color:var(--line);">
      <div id="tabAppts" class="tab active" onclick="switchTab('appts')">Randevular <span id="pendingPill" class="badge b-pending ml-1 hidden">0</span></div>
      <div id="tabSalons" class="tab" onclick="switchTab('salons')">Salonlar</div>
    </div>

    <!-- ───── Appointments ───── -->
    <section id="viewAppts">
      <div class="flex flex-wrap items-center gap-2 mb-4">
        <div class="flex flex-wrap gap-1.5" id="statusChips">
          <button class="chip active" data-st="all">Tümü</button>
          <button class="chip" data-st="approved">Onaylı</button>
          <button class="chip" data-st="cancelled">İptal</button>
          <button class="chip" data-st="pending">Beklemede</button>
        </div>
        <div class="flex items-center gap-2 ml-auto">
          <select id="fSalon" class="fld" style="width:auto; padding:8px 10px; font-size:13px;"><option value="">Tüm salonlar</option></select>
          <input type="date" id="fDate" class="fld" style="width:auto; padding:8px 10px; font-size:13px;">
          <button class="btn btn-ghost btn-sm" onclick="clearDate()">Temizle</button>
        </div>
      </div>
      <div id="apptList" class="space-y-3"></div>
      <div id="apptEmpty" class="hidden text-center py-16" style="color:var(--ink-mute);">Bu kritere uygun randevu yok.</div>
      <div id="apptLoading" class="text-center py-16"><div class="spinner inline-block"></div></div>
    </section>

    <!-- ───── Salons ───── -->
    <section id="viewSalons" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <h2 class="serif text-lg font-semibold">Salonlar</h2>
        <button class="btn btn-primary btn-sm" onclick="openSalonForm()">+ Yeni Salon</button>
      </div>
      <div id="salonList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
      <div id="salonEmpty" class="hidden text-center py-16" style="color:var(--ink-mute);">Henüz salon eklenmemiş. “Yeni Salon” ile başlayın.</div>
      <div id="salonLoading" class="text-center py-16"><div class="spinner inline-block"></div></div>
    </section>
  </div>

  <div id="overlay" class="overlay hidden"></div>
  <div id="toast" class="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const TOKEN = localStorage.getItem('randevu_admin_token');
    const TYPE = { berber:'Berber', kuafor:'Kuaför', both:'Berber & Kuaför', diger:'Diğer' };
    const DAYS = [[1,'Pzt'],[2,'Sal'],[3,'Çar'],[4,'Per'],[5,'Cum'],[6,'Cmt'],[0,'Paz']];
    const DAY_LABEL = { 0:'Paz',1:'Pzt',2:'Sal',3:'Çar',4:'Per',5:'Cum',6:'Cmt' };
    const ST_LABEL = { pending:'Beklemede', approved:'Onaylı', rejected:'Reddedildi', cancelled:'İptal' };
    let SALONS = [];
    let curStatus = 'all';

    function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

    async function api(path, opts={}){
      const res = await fetch(path, {
        ...opts,
        headers: { 'Authorization':'Bearer '+TOKEN, ...(opts.body ? {'Content-Type':'application/json'} : {}), ...(opts.headers||{}) },
      });
      if(res.status === 401){ localStorage.removeItem('randevu_admin_token'); location.href='/randevu/login'; throw new Error('unauth'); }
      return res;
    }
    function logout(){ api('/randevu/api/admin/logout', { method:'POST' }).finally(()=>{ localStorage.removeItem('randevu_admin_token'); location.href='/randevu/login'; }); }

    // ── Boot ──
    if(!TOKEN){ location.href='/randevu/login'; }
    else { boot(); }
    async function boot(){
      try{
        const res = await api('/randevu/api/admin/salons');
        if(!res.ok) throw new Error('salons');
        SALONS = await res.json();
        $('gate').classList.add('hidden'); $('app').classList.remove('hidden');
        fillSalonFilter(); renderSalons(); refreshPendingPill();
        loadAppts();
      }catch(e){ if(e.message!=='unauth'){ $('gate').innerHTML = '<p style="color:var(--red)">Yüklenemedi. Yenileyin.</p>'; } }
    }

    function switchTab(t){
      $('tabAppts').classList.toggle('active', t==='appts');
      $('tabSalons').classList.toggle('active', t==='salons');
      $('viewAppts').classList.toggle('hidden', t!=='appts');
      $('viewSalons').classList.toggle('hidden', t!=='salons');
      if(t==='salons') renderSalons();
      if(t==='appts') loadAppts();
    }

    // ── Appointments ──
    $('statusChips').querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
      $('statusChips').querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
      c.classList.add('active'); curStatus = c.dataset.st; loadAppts();
    }));
    $('fSalon').addEventListener('change', loadAppts);
    $('fDate').addEventListener('change', loadAppts);
    function clearDate(){ $('fDate').value=''; loadAppts(); }

    function fillSalonFilter(){
      $('fSalon').innerHTML = '<option value="">Tüm salonlar</option>' + SALONS.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
    }

    async function loadAppts(){
      $('apptLoading').classList.remove('hidden'); $('apptEmpty').classList.add('hidden'); $('apptList').innerHTML='';
      const qs = new URLSearchParams();
      if(curStatus) qs.set('status', curStatus);
      if($('fSalon').value) qs.set('salon_id', $('fSalon').value);
      if($('fDate').value) qs.set('date', $('fDate').value);
      try{
        const res = await api('/randevu/api/admin/appointments?'+qs.toString());
        const list = await res.json();
        $('apptLoading').classList.add('hidden');
        if(!Array.isArray(list) || !list.length){ $('apptEmpty').classList.remove('hidden'); return; }
        $('apptList').innerHTML = list.map(apptRow).join('');
      }catch(e){ $('apptLoading').classList.add('hidden'); }
    }

    function apptRow(a){
      const cls = 'b-'+a.status;
      const staff = a.staff_name ? ` · ${esc(a.staff_name)}` : '';
      const tel = String(a.phone||'').replace(/[^\d+]/g,'');
      const note = a.note ? `<p class="text-xs mt-2 italic" style="color:var(--ink-mute);">“${esc(a.note)}”</p>` : '';
      const decided = a.decided_note ? `<p class="text-xs mt-1" style="color:var(--ink-mute);">Yönetim notu: ${esc(a.decided_note)}</p>` : '';
      let actions = '';
      if(a.status === 'approved'){
        actions = `<button class="btn btn-red btn-sm" onclick="decide(${a.id},'cancelled')">İptal Et</button>
                   <button class="btn btn-red btn-sm" onclick="delAppt(${a.id})">Sil</button>`;
      } else if(a.status === 'pending'){
        actions = `<button class="btn btn-green btn-sm" onclick="decide(${a.id},'approved')">Onayla</button>
                   <button class="btn btn-red btn-sm" onclick="decide(${a.id},'rejected')">Reddet</button>`;
      } else {
        actions = `<button class="btn btn-green btn-sm" onclick="decide(${a.id},'approved')">Tekrar Onayla</button>
                   <button class="btn btn-red btn-sm" onclick="delAppt(${a.id})">Sil</button>`;
      }
      return `<div class="card p-4">
        <div class="flex items-start justify-between gap-3 flex-wrap">
          <div class="min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-semibold text-[15px]">${esc(a.customer_name)}</span>
              <span class="badge ${cls}">${ST_LABEL[a.status]||a.status}</span>
            </div>
            <p class="text-sm mt-1" style="color:var(--ink-soft);">
              <a href="tel:${esc(tel)}" style="color:var(--accent); font-weight:600;">${esc(a.phone)}</a>
              ${a.email ? ` · <a href="mailto:${esc(a.email)}" style="color:var(--accent);">${esc(a.email)}</a>` : ''}
            </p>
            <p class="text-sm mt-1.5" style="color:var(--ink-soft);">
              <b>${esc(a.salon_name||'')}</b> — ${esc(a.service_name||'')}${staff} <span style="color:var(--ink-mute);">(${a.duration_min} dk)</span>
            </p>
            <p class="text-sm mt-0.5" style="color:var(--accent);"><b>${esc(a.date)}</b> · ${esc(a.time)}</p>
            ${note}${decided}
          </div>
          <div class="flex flex-col gap-2 items-stretch">${actions}</div>
        </div>
      </div>`;
    }

    async function decide(id, status){
      let decided_note = null;
      if(status === 'rejected'){ decided_note = prompt('Ret nedeni (opsiyonel):') || null; }
      try{
        const res = await api('/randevu/api/admin/appointments/'+id, { method:'PATCH', body: JSON.stringify({ status, decided_note }) });
        const data = await res.json();
        if(!res.ok){ toast(data.error || 'İşlem başarısız'); return; }
        toast(status==='approved'?'Onaylandı':status==='rejected'?'Reddedildi':status==='cancelled'?'İptal edildi':'Güncellendi');
        loadAppts(); refreshPendingPill();
      }catch(e){}
    }
    async function delAppt(id){
      if(!confirm('Bu randevu kaydı silinsin mi?')) return;
      const res = await api('/randevu/api/admin/appointments/'+id, { method:'DELETE' });
      if(res.ok){ toast('Silindi'); loadAppts(); refreshPendingPill(); }
    }

    async function refreshPendingPill(){
      try{
        const res = await api('/randevu/api/admin/appointments?status=pending');
        const list = await res.json();
        const n = Array.isArray(list) ? list.length : 0;
        const pill = $('pendingPill');
        pill.textContent = n; pill.classList.toggle('hidden', n===0);
      }catch(e){}
    }

    // ── Salons ──
    async function reloadSalons(){
      const res = await api('/randevu/api/admin/salons');
      SALONS = await res.json();
      fillSalonFilter(); renderSalons();
    }

    function renderSalons(){
      $('salonLoading').classList.add('hidden');
      if(!SALONS.length){ $('salonEmpty').classList.remove('hidden'); $('salonList').innerHTML=''; return; }
      $('salonEmpty').classList.add('hidden');
      $('salonList').innerHTML = SALONS.map(s => {
        const days = String(s.work_days||'').split(',').map(d=>DAY_LABEL[d.trim()]).filter(Boolean).join(' ');
        const pend = Number(s.pending_count)>0 ? `<span class="badge b-pending">${s.pending_count} bekliyor</span>` : '';
        const off = s.is_active ? '' : `<span class="badge b-cancelled">Pasif</span>`;
        return `<div class="card p-4">
          <div class="flex items-start justify-between gap-2">
            <div>
              <div class="flex items-center gap-2 flex-wrap"><h3 class="font-semibold text-[15px]">${esc(s.name)}</h3>${pend}${off}</div>
              <p class="text-xs mt-1" style="color:var(--ink-mute);">${esc(TYPE[s.type]||'Berber')} · ${esc(s.open_time)}–${esc(s.close_time)} · ${esc(s.slot_minutes)}dk slot</p>
              <p class="text-xs mt-0.5" style="color:var(--ink-mute);">${esc(days)}</p>
            </div>
          </div>
          <div class="flex flex-wrap gap-2 mt-3">
            <button class="btn btn-ghost btn-sm" onclick="openSalonForm(${s.id})">Düzenle</button>
            <button class="btn btn-ghost btn-sm" onclick="openServices(${s.id})">Hizmetler</button>
            <button class="btn btn-ghost btn-sm" onclick="openStaff(${s.id})">Ustalar</button>
            <button class="btn btn-red btn-sm" onclick="delSalon(${s.id})">Sil</button>
          </div>
        </div>`;
      }).join('');
    }

    function closeModal(){ $('overlay').classList.add('hidden'); $('overlay').innerHTML=''; }
    $('overlay').addEventListener('click', e => { if(e.target === $('overlay')) closeModal(); });

    function openSalonForm(id){
      const s = id ? SALONS.find(x=>x.id===id) : null;
      const wd = new Set(String(s?.work_days ?? '1,2,3,4,5,6').split(',').map(x=>x.trim()));
      const dayChecks = DAYS.map(([n,lbl]) => `<label class="day-check"><input type="checkbox" value="${n}" ${wd.has(String(n))?'checked':''}> ${lbl}</label>`).join('');
      $('overlay').innerHTML = `<div class="modal">
        <h3 class="serif text-xl font-semibold mb-4">${s ? 'Salonu Düzenle' : 'Yeni Salon'}</h3>
        <div class="space-y-3">
          <div><label class="lbl">Salon adı</label><input id="sName" class="fld" value="${esc(s?.name||'')}" placeholder="Örn. Merkez Berber"></div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="lbl">Tür</label><select id="sType" class="fld">
              <option value="berber" ${s?.type==='berber'?'selected':''}>Berber</option>
              <option value="kuafor" ${s?.type==='kuafor'?'selected':''}>Kuaför</option>
              <option value="both" ${s?.type==='both'?'selected':''}>Berber &amp; Kuaför</option>
              <option value="diger" ${s?.type==='diger'?'selected':''}>Diğer / Genel</option>
            </select></div>
            <div><label class="lbl">Telefon</label><input id="sPhone" class="fld" value="${esc(s?.phone||'')}" placeholder="0212…"></div>
          </div>
          <div><label class="lbl">Adres</label><input id="sAddr" class="fld" value="${esc(s?.address||'')}" placeholder="Adres"></div>
          <div><label class="lbl">Açıklama</label><textarea id="sDesc" class="fld" rows="2" placeholder="Kısa açıklama">${esc(s?.description||'')}</textarea></div>
          <div class="grid grid-cols-3 gap-3">
            <div><label class="lbl">Açılış</label><input id="sOpen" type="time" class="fld" value="${esc(s?.open_time||'09:00')}"></div>
            <div><label class="lbl">Kapanış</label><input id="sClose" type="time" class="fld" value="${esc(s?.close_time||'18:00')}"></div>
            <div><label class="lbl">Slot (dk)</label><input id="sSlot" type="number" min="5" max="240" step="5" class="fld" value="${esc(s?.slot_minutes||30)}"></div>
          </div>
          <div><label class="lbl">Çalışma günleri</label><div class="flex flex-wrap gap-2" id="sDays">${dayChecks}</div></div>
          <label class="day-check" style="width:fit-content;"><input type="checkbox" id="sActive" ${(!s || s.is_active)?'checked':''}> Aktif (sitede görünür)</label>
        </div>
        <div id="salonErr" class="hidden text-sm mt-3" style="color:var(--red);"></div>
        <div class="flex gap-2 justify-end mt-5">
          <button class="btn btn-ghost" onclick="closeModal()">Vazgeç</button>
          <button class="btn btn-primary" id="salonSave" onclick="saveSalon(${id||0})">Kaydet</button>
        </div>
      </div>`;
      $('overlay').classList.remove('hidden');
    }

    async function saveSalon(id){
      const days = [...$('sDays').querySelectorAll('input:checked')].map(i=>i.value);
      const body = {
        name: $('sName').value.trim(), type: $('sType').value, phone: $('sPhone').value.trim(),
        address: $('sAddr').value.trim(), description: $('sDesc').value.trim(),
        open_time: $('sOpen').value, close_time: $('sClose').value, slot_minutes: Number($('sSlot').value)||30,
        work_days: days.join(','), is_active: $('sActive').checked ? 1 : 0,
      };
      if(!body.name){ showErr('salonErr','Salon adı zorunlu'); return; }
      if(!days.length){ showErr('salonErr','En az bir çalışma günü seçin'); return; }
      const btn = $('salonSave'); btn.disabled=true; btn.textContent='Kaydediliyor…';
      try{
        const res = await api(id ? '/randevu/api/admin/salons/'+id : '/randevu/api/admin/salons', { method: id?'PATCH':'POST', body: JSON.stringify(body) });
        const data = await res.json();
        if(!res.ok){ showErr('salonErr', data.error||'Hata'); btn.disabled=false; btn.textContent='Kaydet'; return; }
        closeModal(); await reloadSalons(); toast(id?'Güncellendi':'Salon eklendi');
      }catch(e){ btn.disabled=false; btn.textContent='Kaydet'; }
    }
    function showErr(id,msg){ const el=$(id); el.textContent=msg; el.classList.remove('hidden'); }

    async function delSalon(id){
      const s = SALONS.find(x=>x.id===id);
      if(!confirm(`“${s?.name}” salonu ve tüm hizmet/usta/randevuları silinsin mi?`)) return;
      const res = await api('/randevu/api/admin/salons/'+id, { method:'DELETE' });
      if(res.ok){ toast('Salon silindi'); await reloadSalons(); refreshPendingPill(); }
    }

    // ── Services ──
    async function openServices(salonId){
      const s = SALONS.find(x=>x.id===salonId);
      $('overlay').innerHTML = `<div class="modal">
        <div class="flex items-center justify-between mb-4"><h3 class="serif text-xl font-semibold">Hizmetler — ${esc(s?.name||'')}</h3><button class="btn btn-ghost btn-sm" onclick="closeModal()">Kapat</button></div>
        <div id="svcList" class="space-y-2 mb-4"><div class="spinner"></div></div>
        <div class="card p-3" style="background:var(--bg-soft);">
          <div class="grid grid-cols-12 gap-2 items-end">
            <div class="col-span-5"><label class="lbl">Hizmet</label><input id="svcName" class="fld" placeholder="Saç kesimi"></div>
            <div class="col-span-3"><label class="lbl">Süre (dk)</label><input id="svcDur" type="number" min="5" max="600" step="5" class="fld" value="30"></div>
            <div class="col-span-2"><label class="lbl">Ücret ₺</label><input id="svcPrice" type="number" min="0" step="1" class="fld" value="0"></div>
            <div class="col-span-2"><button class="btn btn-primary w-full" onclick="addService(${salonId})">Ekle</button></div>
          </div>
        </div>
      </div>`;
      $('overlay').classList.remove('hidden');
      loadServices(salonId);
    }
    async function loadServices(salonId){
      const res = await api('/randevu/api/admin/salons/'+salonId+'/services');
      const list = await res.json();
      const box = $('svcList'); if(!box) return;
      if(!list.length){ box.innerHTML = '<p class="text-sm" style="color:var(--ink-mute);">Henüz hizmet yok.</p>'; return; }
      box.innerHTML = list.map(sv => `<div class="flex items-center gap-2 card p-2.5">
        <div class="flex-1 min-w-0">
          <span class="font-semibold text-sm">${esc(sv.name)}</span>
          <span class="text-xs ml-2" style="color:var(--ink-mute);">${sv.duration_min} dk${Number(sv.price)>0?' · '+Number(sv.price).toLocaleString('tr-TR')+' ₺':''}</span>
          ${sv.is_active? '' : '<span class="badge b-cancelled ml-1">pasif</span>'}
        </div>
        <button class="btn btn-ghost btn-sm" onclick="toggleService(${sv.id},${sv.is_active?0:1})">${sv.is_active?'Pasifle':'Aktifle'}</button>
        <button class="btn btn-red btn-sm" onclick="delService(${sv.id},${salonId})">Sil</button>
      </div>`).join('');
    }
    async function addService(salonId){
      const name = $('svcName').value.trim();
      if(!name){ toast('Hizmet adı girin'); return; }
      const res = await api('/randevu/api/admin/salons/'+salonId+'/services', { method:'POST', body: JSON.stringify({ name, duration_min:Number($('svcDur').value)||30, price:Number($('svcPrice').value)||0 }) });
      if(res.ok){ $('svcName').value=''; $('svcPrice').value='0'; loadServices(salonId); toast('Hizmet eklendi'); }
    }
    async function toggleService(id, active){
      const res = await api('/randevu/api/admin/services/'+id, { method:'PATCH', body: JSON.stringify({ is_active: active }) });
      if(res.ok){ const sid = currentServiceSalon(); if(sid) loadServices(sid); }
    }
    async function delService(id, salonId){
      if(!confirm('Hizmet silinsin mi?')) return;
      const res = await api('/randevu/api/admin/services/'+id, { method:'DELETE' });
      if(res.ok){ loadServices(salonId); toast('Silindi'); }
    }
    function currentServiceSalon(){ const m=$('overlay').querySelector('[onclick^="addService"]'); if(!m) return null; const mm=/addService\((\d+)\)/.exec(m.getAttribute('onclick')); return mm?Number(mm[1]):null; }

    // ── Staff ──
    async function openStaff(salonId){
      const s = SALONS.find(x=>x.id===salonId);
      $('overlay').innerHTML = `<div class="modal">
        <div class="flex items-center justify-between mb-2"><h3 class="serif text-xl font-semibold">Ustalar — ${esc(s?.name||'')}</h3><button class="btn btn-ghost btn-sm" onclick="closeModal()">Kapat</button></div>
        <p class="text-xs mb-4" style="color:var(--ink-mute);">Usta eklerseniz müşteri randevuda usta seçmek zorundadır ve uygunluk usta bazında hesaplanır. Boş bırakırsanız randevular salon bazında çalışır.</p>
        <div id="staffList2" class="space-y-2 mb-4"><div class="spinner"></div></div>
        <div class="card p-3" style="background:var(--bg-soft);">
          <div class="flex gap-2 items-end">
            <div class="flex-1"><label class="lbl">Usta adı</label><input id="stName" class="fld" placeholder="Örn. Ahmet Usta"></div>
            <button class="btn btn-primary" onclick="addStaff(${salonId})">Ekle</button>
          </div>
        </div>
      </div>`;
      $('overlay').classList.remove('hidden');
      loadStaff(salonId);
    }
    async function loadStaff(salonId){
      const res = await api('/randevu/api/admin/salons/'+salonId+'/staff');
      const list = await res.json();
      const box = $('staffList2'); if(!box) return;
      if(!list.length){ box.innerHTML = '<p class="text-sm" style="color:var(--ink-mute);">Usta tanımlı değil (salon bazında çalışıyor).</p>'; return; }
      box.innerHTML = list.map(st => `<div class="flex items-center gap-2 card p-2.5">
        <div class="flex-1"><span class="font-semibold text-sm">${esc(st.name)}</span>${st.is_active?'':'<span class="badge b-cancelled ml-1">pasif</span>'}</div>
        <button class="btn btn-ghost btn-sm" onclick="toggleStaff(${st.id},${st.is_active?0:1},${salonId})">${st.is_active?'Pasifle':'Aktifle'}</button>
        <button class="btn btn-red btn-sm" onclick="delStaff(${st.id},${salonId})">Sil</button>
      </div>`).join('');
    }
    async function addStaff(salonId){
      const name = $('stName').value.trim();
      if(!name){ toast('Usta adı girin'); return; }
      const res = await api('/randevu/api/admin/salons/'+salonId+'/staff', { method:'POST', body: JSON.stringify({ name }) });
      if(res.ok){ $('stName').value=''; loadStaff(salonId); toast('Usta eklendi'); }
    }
    async function toggleStaff(id, active, salonId){
      const res = await api('/randevu/api/admin/staff/'+id, { method:'PATCH', body: JSON.stringify({ is_active: active }) });
      if(res.ok) loadStaff(salonId);
    }
    async function delStaff(id, salonId){
      if(!confirm('Usta silinsin mi?')) return;
      const res = await api('/randevu/api/admin/staff/'+id, { method:'DELETE' });
      if(res.ok){ loadStaff(salonId); toast('Silindi'); }
    }
  </script>
</body>
</html>
