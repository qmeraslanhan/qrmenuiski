<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hesabım — İSKİ Randevu</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="robots" content="noindex,nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/tailwind.js"></script>
  <style>
    :root { --bg:#0B1E3F; --bg-deep:#061330; --gold:#C9A961; --gold-light:#E0C783; --gold-dark:#A88847; --cream:#F5E6CC; --cream-soft:#D9C5A0; --surface:#FBFAF6; --ink:#2B2926; --ink-soft:#6B6358;
      --green:#0F7B4F; --green-bg:#E7F5EE; --amber:#9A6B00; --amber-bg:#FBF1DC; --red:#B91C1C; --red-bg:#FBE9E9; }
    * { font-family:'DM Sans',sans-serif; box-sizing:border-box; }
    body { background:radial-gradient(ellipse 700px 500px at 50% 0%, rgba(201,169,97,0.08), transparent 60%), var(--bg); min-height:100vh; color:var(--cream); }
    .display { font-family:'Cinzel',serif; }
    .logo-white { filter:brightness(0) invert(1); }
    .card { background:var(--surface); color:var(--ink); border:1.5px solid var(--gold); border-radius:14px; }
    .badge { font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:999px; }
    .b-pending{ background:var(--amber-bg); color:var(--amber); } .b-approved{ background:var(--green-bg); color:var(--green); }
    .b-rejected{ background:var(--red-bg); color:var(--red); } .b-cancelled{ background:#EEE; color:#777; } .b-noshow{ background:var(--red-bg); color:var(--red); }
    .b-done{ background:var(--green-bg); color:var(--green); }
    .op-row{ display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid #EFE7D6; flex-wrap:wrap; }
    .op-row:first-child{ border-top:none; }
    .op-time{ font-weight:700; font-size:14px; color:var(--ink); min-width:46px; }
    .op-stat{ text-align:center; background:#FBF7EE; border:1px solid #EFE3CC; border-radius:9px; padding:7px 4px; }
    .op-stat b{ display:block; font-size:17px; color:var(--ink); } .op-stat span{ font-size:10.5px; color:var(--ink-soft); }
    .field{ width:100%; border:1px solid #D4C9B5; border-radius:9px; padding:9px 11px; font-size:13.5px; color:var(--ink); background:#fff; outline:none; }
    .field:focus{ border-color:var(--gold); }
    .mini-btn{ font-size:12px; font-weight:600; padding:6px 12px; border-radius:9px; border:1px solid var(--gold); color:var(--gold-dark); background:#fff; cursor:pointer; transition:background .15s; }
    .mini-btn:hover{ background:rgba(201,169,97,0.12); }
    .mini-btn.red{ border-color:rgba(185,28,28,0.4); color:var(--red); }
    .mini-btn.red:hover{ background:var(--red-bg); }
    .mini-btn:disabled{ cursor:not-allowed; }
    .rdate{ border:1px solid #D4C9B5; border-radius:9px; padding:8px 10px; font-size:13px; color:var(--ink); background:#fff; outline:none; }
    .rslot{ border:1px solid #E7DEC9; border-radius:8px; padding:7px 0; text-align:center; font-size:12.5px; font-weight:600; cursor:pointer; background:#fff; color:var(--ink); }
    .rslot:hover{ border-color:var(--gold); }
    .rslot.sel{ background:var(--gold-dark); color:#fff; border-color:var(--gold-dark); }
    .code-chip{ display:inline-block; font-size:11px; font-weight:700; letter-spacing:.05em; color:var(--gold-dark); background:rgba(201,169,97,0.14); border:1px solid var(--gold); border-radius:7px; padding:2px 8px; }
    .btn-outline { display:inline-flex; align-items:center; gap:7px; padding:10px 20px; border:1.5px solid var(--gold); border-radius:999px; color:var(--cream); font-size:13px; font-weight:600; text-decoration:none; background:rgba(201,169,97,0.06); cursor:pointer; transition:all .25s; }
    .btn-outline:hover { background:var(--gold); color:var(--bg-deep); }
    .spinner { width:34px; height:34px; border:2px solid rgba(201,169,97,0.3); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <main class="max-w-2xl mx-auto px-5 py-7">
    <div class="flex items-center justify-center gap-5 mb-6">
      <img src="/img/iski-logo.png" alt="İSKİ" class="logo-white h-10 w-auto object-contain">
      <div style="width:1px;height:34px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);"></div>
      <img src="/img/ibb-mavi.png" alt="İBB" class="logo-white h-10 w-auto object-contain">
    </div>

    <header class="flex items-center justify-between mb-6">
      <div>
        <h1 class="display text-2xl font-semibold" style="color:var(--gold);">Hesabım</h1>
        <p id="greet" class="text-sm mt-0.5" style="color:var(--cream-soft);"></p>
      </div>
      <div class="flex gap-2">
        <a href="/randevu" class="btn-outline">Salonlar</a>
        <button onclick="logout()" class="btn-outline">Çıkış</button>
      </div>
    </header>

    <!-- Operatör paneli (yalnızca atanmış üyelere görünür) -->
    <section id="opPanel" class="hidden mb-9">
      <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h2 class="text-xs font-semibold tracking-widest uppercase" style="color:var(--gold);">Salon Yönetimi</h2>
        <select id="opSalon" class="rdate" onchange="opLoad()"></select>
      </div>
      <div class="card p-4">
        <div class="flex items-center justify-between gap-2 mb-3">
          <button class="mini-btn" onclick="opDay(-1)">‹ Önceki</button>
          <input type="date" id="opDate" class="rdate text-center" onchange="opLoad()" style="flex:1;">
          <button class="mini-btn" onclick="opDay(1)">Sonraki ›</button>
        </div>
        <div id="opStats" class="grid grid-cols-4 gap-2 mb-3"></div>
        <div id="opLoading" class="text-center py-6 hidden"><div class="spinner inline-block"></div></div>
        <div id="opList"></div>
      </div>
    </section>

    <h2 class="text-xs font-semibold tracking-widest uppercase mb-3" style="color:var(--cream-soft);">Randevularım</h2>

    <div id="loading" class="text-center py-16"><div class="spinner inline-block"></div></div>
    <div id="empty" class="hidden text-center py-16 card">
      <p class="px-6 py-2" style="color:var(--ink-soft);">Henüz randevunuz yok.</p>
      <a href="/randevu" class="inline-block mt-2 mb-4 font-semibold text-sm" style="color:var(--gold-dark);">Randevu al →</a>
    </div>
    <div id="list" class="hidden space-y-3"></div>

    <!-- Hesap ayarları: şifre değiştir -->
    <section class="mt-10">
      <h2 class="text-xs font-semibold tracking-widest uppercase mb-3" style="color:var(--cream-soft);">Hesap Ayarları</h2>
      <div class="card p-4">
        <button id="pwToggle" class="mini-btn" onclick="togglePw()">🔒 Şifre Değiştir</button>
        <div id="pwForm" class="hidden mt-4 space-y-3" style="max-width:340px;">
          <div>
            <label class="text-xs font-semibold" style="color:var(--ink-soft);">Mevcut şifre</label>
            <input type="password" id="pwCur" class="field mt-1" autocomplete="current-password">
          </div>
          <div>
            <label class="text-xs font-semibold" style="color:var(--ink-soft);">Yeni şifre (en az 6 karakter)</label>
            <input type="password" id="pwNew" class="field mt-1" autocomplete="new-password">
          </div>
          <div>
            <label class="text-xs font-semibold" style="color:var(--ink-soft);">Yeni şifre (tekrar)</label>
            <input type="password" id="pwNew2" class="field mt-1" autocomplete="new-password">
          </div>
          <div id="pwMsg" class="text-xs" style="min-height:14px;"></div>
          <button id="pwSave" class="mini-btn" onclick="savePw()">Kaydet</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const TOKEN = localStorage.getItem('randevu_member_token');
    const ST = { pending:'Beklemede', approved:'Onaylandı', rejected:'Reddedildi', cancelled:'İptal', noshow:'Gelmedi', done:'Tamamlandı' };
    function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    if(!TOKEN) location.href = '/randevu/uye?next=/randevu/hesabim';

    const APPTS = {};   // id -> randevu
    const RESCH = {};   // id -> seçilen saat
    function istNow(){ const d=new Date(Date.now()+3*3600*1000); return { date:d.toISOString().slice(0,10), min:d.getUTCHours()*60+d.getUTCMinutes() }; }
    function toMin(t){ const [h,m]=String(t).split(':').map(Number); return h*60+m; }
    function isFuture(a){ const n=istNow(); return a.date>n.date || (a.date===n.date && toMin(a.time)>n.min); }

    async function logout(){
      try{ await fetch('/randevu/api/member/logout', { method:'POST', headers:{'Authorization':'Bearer '+TOKEN} }); }catch{}
      localStorage.removeItem('randevu_member_token'); localStorage.removeItem('randevu_member_name');
      location.href = '/randevu';
    }

    async function load(){
      try{
        const res = await fetch('/randevu/api/member/me', { headers:{'Authorization':'Bearer '+TOKEN} });
        if(res.status === 401){ localStorage.removeItem('randevu_member_token'); location.href='/randevu/uye?next=/randevu/hesabim'; return; }
        const data = await res.json();
        $('greet').textContent = data.member.name + '  ·  ' + data.member.email;
        $('loading').classList.add('hidden'); $('empty').classList.add('hidden');
        const appts = data.appointments || [];
        if(!appts.length){ $('empty').classList.remove('hidden'); $('list').classList.add('hidden'); return; }
        $('list').classList.remove('hidden');
        $('list').innerHTML = appts.map(renderAppt).join('');
      }catch(e){ $('loading').classList.add('hidden'); $('empty').classList.remove('hidden'); }
    }
    function reload(){ $('list').innerHTML=''; $('list').classList.add('hidden'); $('loading').classList.remove('hidden'); load(); }

    function renderAppt(a){
      APPTS[a.id] = a;
      const staff = a.staff_name ? ' · ' + esc(a.staff_name) : '';
      const code = a.code ? ` <span class="code-chip">${esc(a.code)}</span>` : '';
      const canChange = (a.status==='approved' || a.status==='pending') && isFuture(a);
      const actions = canChange ? `
        <div class="flex gap-2 mt-3">
          <button class="mini-btn" onclick="openResched(${a.id})">Ertele</button>
          <button class="mini-btn red" onclick="cancelAppt(${a.id})">İptal Et</button>
        </div>
        <div id="resch-${a.id}" class="hidden mt-3" style="border-top:1px solid #E7DEC9;padding-top:12px;">
          <label class="text-xs font-semibold" style="color:var(--ink-soft);">Yeni tarih</label>
          <input type="date" id="rdate-${a.id}" class="rdate block mt-1" onchange="reschedSlots(${a.id})">
          <div id="rslots-${a.id}" class="grid grid-cols-4 gap-2 mt-3"></div>
          <div id="rmsg-${a.id}" class="text-xs mt-2" style="color:var(--red);"></div>
          <div class="flex gap-2 mt-3">
            <button class="mini-btn" id="rok-${a.id}" onclick="confirmResched(${a.id})" disabled style="opacity:.5;">Onayla</button>
            <button class="mini-btn" onclick="closeResched(${a.id})">Vazgeç</button>
          </div>
        </div>` : '';
      return `<div class="card p-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="font-semibold" style="font-size:15px;">${esc(a.salon_name||'')}${code}</p>
            <p class="text-sm mt-0.5" style="color:var(--ink-soft);">${esc(a.service_name||'')}${staff} <span style="color:#8A8275;">(${a.duration_min} dk)</span></p>
            <p class="text-sm mt-1" style="color:var(--gold-dark); font-weight:600;">${esc(a.date)} · ${esc(a.time)}</p>
          </div>
          <span class="badge b-${a.status}">${ST[a.status]||a.status}</span>
        </div>
        ${actions}
      </div>`;
    }

    function openResched(id){ $('resch-'+id).classList.remove('hidden'); $('rdate-'+id).min = istNow().date; }
    function closeResched(id){ $('resch-'+id).classList.add('hidden'); }
    function setRok(id,on){ const b=$('rok-'+id); if(!b) return; b.disabled=!on; b.style.opacity=on?'1':'.5'; }

    async function reschedSlots(id){
      const a = APPTS[id]; const date = $('rdate-'+id).value;
      const box = $('rslots-'+id); const msg = $('rmsg-'+id);
      msg.textContent=''; box.innerHTML=''; RESCH[id]=null; setRok(id,false);
      if(!date) return;
      try{
        const qs = new URLSearchParams({ date, service_id:a.service_id });
        if(a.staff_id) qs.set('staff_id', a.staff_id);
        const res = await fetch(`/randevu/api/salons/${encodeURIComponent(a.salon_slug)}/slots?`+qs.toString());
        const d = await res.json();
        const slots = d.slots || [];
        if(!slots.length){ msg.textContent = d.reason==='closed' ? 'Salon o gün kapalı.' : 'Uygun saat yok.'; return; }
        box.innerHTML = slots.map(t=>`<button type="button" class="rslot" data-t="${t}" onclick="pickResched(${id},this)">${t}</button>`).join('');
      }catch(e){ msg.textContent='Saatler alınamadı.'; }
    }
    function pickResched(id, el){ const box=$('rslots-'+id); box.querySelectorAll('.rslot').forEach(x=>x.classList.remove('sel')); el.classList.add('sel'); RESCH[id]=el.dataset.t; setRok(id,true); }

    async function confirmResched(id){
      const date=$('rdate-'+id).value; const time=RESCH[id]; const a=APPTS[id];
      if(!date||!time) return;
      const b=$('rok-'+id); b.disabled=true; b.textContent='…';
      try{
        const res = await fetch('/randevu/api/member/appointments/'+id, { method:'PATCH', headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}, body: JSON.stringify({ action:'reschedule', date, time, staff_id:a.staff_id||null }) });
        const d = await res.json();
        if(!res.ok){ $('rmsg-'+id).textContent = d.error||'İşlem başarısız.'; b.disabled=false; b.textContent='Onayla'; return; }
        reload();
      }catch{ $('rmsg-'+id).textContent='Bağlantı hatası.'; b.disabled=false; b.textContent='Onayla'; }
    }

    async function cancelAppt(id){
      if(!confirm('Randevunuzu iptal etmek istediğinize emin misiniz?')) return;
      try{
        const res = await fetch('/randevu/api/member/appointments/'+id, { method:'PATCH', headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}, body: JSON.stringify({ action:'cancel' }) });
        if(res.ok) reload();
      }catch{}
    }

    // ── Şifre değiştir ──
    function togglePw(){ $('pwForm').classList.toggle('hidden'); }
    async function savePw(){
      const cur=$('pwCur').value, nw=$('pwNew').value, nw2=$('pwNew2').value;
      const msg=$('pwMsg'); msg.style.color='var(--red)';
      if(nw.length<6){ msg.textContent='Yeni şifre en az 6 karakter olmalı.'; return; }
      if(nw!==nw2){ msg.textContent='Yeni şifreler eşleşmiyor.'; return; }
      const b=$('pwSave'); b.disabled=true; b.textContent='…';
      try{
        const res=await fetch('/randevu/api/member/password', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}, body:JSON.stringify({ current:cur, password:nw }) });
        const d=await res.json();
        if(!res.ok){ msg.textContent=d.error||'İşlem başarısız.'; b.disabled=false; b.textContent='Kaydet'; return; }
        msg.style.color='var(--green)'; msg.textContent='Şifreniz güncellendi.';
        $('pwCur').value=$('pwNew').value=$('pwNew2').value='';
        b.disabled=false; b.textContent='Kaydet';
        setTimeout(()=>{ $('pwForm').classList.add('hidden'); msg.textContent=''; }, 1500);
      }catch{ msg.textContent='Bağlantı hatası.'; b.disabled=false; b.textContent='Kaydet'; }
    }

    // ── Operatör paneli (salon yönetimi) ──
    const OP = { salons:[], appts:{} };
    const OP_ST = { approved:'Bekliyor', pending:'Bekliyor', done:'Tamamlandı', noshow:'Gelmedi', cancelled:'İptal', rejected:'Reddedildi' };
    async function opInit(){
      try{
        const res = await fetch('/randevu/api/member/operator', { headers:{'Authorization':'Bearer '+TOKEN} });
        if(!res.ok) return;
        const d = await res.json();
        OP.salons = d.salons || [];
        if(!OP.salons.length) return;
        $('opPanel').classList.remove('hidden');
        $('opSalon').innerHTML = OP.salons.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
        $('opDate').value = istNow().date;
        if(OP.salons.length<2) $('opSalon').classList.add('hidden');
        opLoad();
      }catch{}
    }
    function opDay(delta){
      const cur=$('opDate').value || istNow().date;
      const d=new Date(cur+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+delta);
      $('opDate').value=d.toISOString().slice(0,10); opLoad();
    }
    async function opLoad(){
      const salon_id=$('opSalon').value, date=$('opDate').value;
      if(!salon_id||!date) return;
      $('opList').innerHTML=''; $('opStats').innerHTML=''; $('opLoading').classList.remove('hidden');
      try{
        const qs=new URLSearchParams({ salon_id, date });
        const res=await fetch('/randevu/api/member/operator/appointments?'+qs.toString(), { headers:{'Authorization':'Bearer '+TOKEN} });
        const d=await res.json();
        $('opLoading').classList.add('hidden');
        const appts=d.appointments||[];
        const active=appts.filter(a=>a.status==='approved'||a.status==='pending').length;
        const done=appts.filter(a=>a.status==='done').length;
        const off=appts.filter(a=>a.status==='noshow'||a.status==='cancelled'||a.status==='rejected').length;
        $('opStats').innerHTML = [['Toplam',appts.length],['Bekleyen',active],['Tamamlanan',done],['Gelmedi/İptal',off]]
          .map(([l,n])=>`<div class="op-stat"><b>${n}</b><span>${l}</span></div>`).join('');
        if(!appts.length){ $('opList').innerHTML='<p class="text-center py-5 text-sm" style="color:var(--ink-soft);">Bu gün için randevu yok.</p>'; return; }
        $('opList').innerHTML = appts.map(opRow).join('');
      }catch{ $('opLoading').classList.add('hidden'); $('opList').innerHTML='<p class="text-center py-5 text-sm" style="color:var(--red);">Yüklenemedi.</p>'; }
    }
    function opRow(a){
      OP.appts[a.id]=a;
      const phone = a.phone ? ` · <a href="tel:${esc(a.phone)}" style="color:var(--gold-dark);">${esc(a.phone)}</a>` : '';
      const staff = a.staff_name ? ' · '+esc(a.staff_name) : '';
      const acts=[];
      if(a.status!=='done')   acts.push(`<button class="mini-btn" onclick="opSet(${a.id},'done')">Tamamlandı</button>`);
      if(a.status!=='noshow') acts.push(`<button class="mini-btn red" onclick="opSet(${a.id},'noshow')">Gelmedi</button>`);
      if(a.status!=='cancelled' && a.status!=='approved') acts.push(`<button class="mini-btn" onclick="opSet(${a.id},'approved')">Geri al</button>`);
      if(a.status!=='cancelled') acts.push(`<button class="mini-btn red" onclick="opSet(${a.id},'cancelled')">İptal</button>`);
      return `<div class="op-row" id="op-${a.id}">
        <span class="op-time">${esc(a.time)}</span>
        <div style="flex:1; min-width:150px;">
          <p class="font-semibold" style="font-size:14px; color:var(--ink);">${esc(a.customer_name||'')}</p>
          <p class="text-xs" style="color:var(--ink-soft);">${esc(a.service_name||'')}${staff} <span style="color:#A89F8C;">(${a.duration_min} dk)</span>${phone}</p>
        </div>
        <span class="badge b-${a.status}">${OP_ST[a.status]||a.status}</span>
        <div class="flex gap-1.5 w-full md:w-auto" style="flex-wrap:wrap;">${acts.join('')}</div>
      </div>`;
    }
    const OP_VERB = { approved:'geri almak (bekliyor)', done:'“tamamlandı” işaretlemek', noshow:'“gelmedi” işaretlemek', cancelled:'iptal etmek' };
    async function opSet(id, status){
      if(!confirm('Bu randevuyu '+(OP_VERB[status]||'güncellemek')+' istediğinize emin misiniz?')) return;
      const row=$('op-'+id); if(row) row.style.opacity='.5';
      try{
        const res=await fetch('/randevu/api/member/operator/appointments/'+id, { method:'PATCH', headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}, body:JSON.stringify({ status }) });
        if(res.ok){ opLoad(); } else { if(row) row.style.opacity='1'; const d=await res.json().catch(()=>({})); alert(d.error||'İşlem başarısız.'); }
      }catch{ if(row) row.style.opacity='1'; }
    }

    load();
    opInit();
  </script>
</body>
</html>
