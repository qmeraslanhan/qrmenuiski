<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Üyelik — İSKİ Randevu</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="robots" content="noindex,nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg:#0B1E3F; --bg-deep:#061330; --gold:#C9A961; --gold-light:#E0C783; --cream:#F5E6CC; --cream-soft:#D9C5A0; }
    * { font-family:'DM Sans',sans-serif; box-sizing:border-box; }
    body { background:radial-gradient(ellipse 700px 500px at 50% 0%, rgba(201,169,97,0.10), transparent 60%), var(--bg); min-height:100vh; }
    .display { font-family:'Cinzel',serif; }
    .fld { width:100%; background:rgba(255,255,255,0.06); border:1px solid var(--gold); color:var(--cream); border-radius:12px; padding:12px 14px; font-size:14px; outline:none; transition:border-color .2s, box-shadow .2s; }
    .fld:focus { border-color:var(--gold-light); box-shadow:0 0 0 4px rgba(201,169,97,0.15); }
    .fld::placeholder { color:var(--cream-soft); opacity:.6; }
    .lbl { display:block; font-size:12px; font-weight:600; margin-bottom:5px; color:var(--cream-soft); }
    .btn-gold { width:100%; background:linear-gradient(180deg, var(--gold-light), var(--gold)); color:var(--bg-deep); font-weight:700; border:none; border-radius:12px; padding:13px; cursor:pointer; transition:filter .2s, transform .2s; }
    .btn-gold:hover { filter:brightness(1.05); transform:translateY(-1px); }
    .btn-gold:disabled { opacity:.6; cursor:not-allowed; }
    .seg { display:flex; background:rgba(255,255,255,0.05); border:1px solid var(--gold); border-radius:999px; padding:4px; margin-bottom:20px; }
    .seg button { flex:1; padding:9px; border-radius:999px; font-weight:600; font-size:14px; color:var(--cream-soft); background:transparent; border:none; cursor:pointer; transition:all .2s; }
    .seg button.active { background:var(--gold); color:var(--bg-deep); }
    .hidden { display:none !important; }
    .top-back { position:absolute; top:20px; left:20px; display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border:1px solid rgba(201,169,97,0.5); border-radius:999px; color:var(--cream); font-size:12px; font-weight:500; text-decoration:none; background:rgba(11,30,63,0.6); transition:background .3s,color .3s; }
    .top-back:hover { background:var(--gold); color:var(--bg-deep); }
    .top-back svg { width:14px; height:14px; }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <a href="/randevu" class="top-back">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    <span>Salonlar</span>
  </a>

  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="flex items-center justify-center gap-5 mb-5">
        <img src="/img/iski-logo.png" alt="İSKİ" class="h-10 w-auto object-contain" style="filter:brightness(0) invert(1);">
        <div style="width:1px;height:32px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);"></div>
        <img src="/img/ibb-mavi.png" alt="İBB" class="h-10 w-auto object-contain" style="filter:brightness(0) invert(1);">
      </div>
      <h1 class="display text-2xl font-semibold" style="color:var(--gold);">Üyelik</h1>
      <p class="text-sm mt-1" style="color:var(--cream-soft);">Randevu almak için giriş yapın veya üye olun</p>
    </div>

    <div style="background:rgba(255,255,255,0.04); border:1.5px solid var(--gold); border-radius:18px; padding:24px;">
      <div class="seg">
        <button id="segLogin" class="active" onclick="showTab('login')">Giriş Yap</button>
        <button id="segReg" onclick="showTab('reg')">Üye Ol</button>
      </div>

      <!-- Login -->
      <form id="loginForm" class="space-y-3" onsubmit="doLogin(event)">
        <div><label class="lbl">E-posta</label><input id="lEmail" type="email" class="fld" placeholder="ornek@eposta.com" required autocomplete="email"></div>
        <div><label class="lbl">Şifre</label><input id="lPass" type="password" class="fld" placeholder="Şifreniz" required autocomplete="current-password"></div>
        <div id="loginErr" class="hidden text-sm text-center px-3 py-2.5 rounded-xl" style="color:#FCA5A5; background:rgba(220,38,38,0.12); border:1px solid rgba(220,38,38,0.3);"></div>
        <button type="submit" id="lBtn" class="btn-gold">Giriş Yap</button>
      </form>

      <!-- Register -->
      <form id="regForm" class="space-y-3 hidden" onsubmit="doReg(event)">
        <div><label class="lbl">Ad Soyad</label><input id="rName" type="text" class="fld" placeholder="Adınız Soyadınız" required autocomplete="name"></div>
        <div><label class="lbl">E-posta</label><input id="rEmail" type="email" class="fld" placeholder="ornek@eposta.com" required autocomplete="email"></div>
        <div><label class="lbl">Telefon</label><input id="rPhone" type="tel" class="fld" placeholder="05XX XXX XX XX" required autocomplete="tel"></div>
        <div><label class="lbl">Şifre</label><input id="rPass" type="password" class="fld" placeholder="En az 6 karakter" required minlength="6" autocomplete="new-password"></div>
        <div id="regErr" class="hidden text-sm text-center px-3 py-2.5 rounded-xl" style="color:#FCA5A5; background:rgba(220,38,38,0.12); border:1px solid rgba(220,38,38,0.3);"></div>
        <button type="submit" id="rBtn" class="btn-gold">Üye Ol</button>
      </form>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const NEXT = params.get('next') || '/randevu';

    // Zaten girişliyse yönlendir
    if (localStorage.getItem('randevu_member_token')) location.href = NEXT;

    function showTab(t){
      const login = t === 'login';
      $('segLogin').classList.toggle('active', login);
      $('segReg').classList.toggle('active', !login);
      $('loginForm').classList.toggle('hidden', !login);
      $('regForm').classList.toggle('hidden', login);
    }
    if (params.get('tab') === 'reg') showTab('reg');

    function fail(id, msg){ const e=$(id); e.textContent=msg; e.classList.remove('hidden'); }

    async function doLogin(e){
      e.preventDefault();
      const btn=$('lBtn'); $('loginErr').classList.add('hidden');
      btn.disabled=true; btn.textContent='Giriş yapılıyor…';
      try{
        const res = await fetch('/randevu/api/member/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email:$('lEmail').value.trim(), password:$('lPass').value }) });
        const data = await res.json();
        if(!res.ok){ fail('loginErr', data.error || 'Giriş başarısız'); return; }
        localStorage.setItem('randevu_member_token', data.token);
        localStorage.setItem('randevu_member_name', data.member.name);
        location.href = NEXT;
      }catch{ fail('loginErr','Bağlantı hatası'); }
      finally{ btn.disabled=false; btn.textContent='Giriş Yap'; }
    }

    async function doReg(e){
      e.preventDefault();
      const btn=$('rBtn'); $('regErr').classList.add('hidden');
      btn.disabled=true; btn.textContent='Kaydediliyor…';
      try{
        const res = await fetch('/randevu/api/member/register', { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ name:$('rName').value.trim(), email:$('rEmail').value.trim(), phone:$('rPhone').value.trim(), password:$('rPass').value }) });
        const data = await res.json();
        if(!res.ok){ fail('regErr', data.error || 'Kayıt başarısız'); return; }
        localStorage.setItem('randevu_member_token', data.token);
        localStorage.setItem('randevu_member_name', data.member.name);
        location.href = NEXT;
      }catch{ fail('regErr','Bağlantı hatası'); }
      finally{ btn.disabled=false; btn.textContent='Üye Ol'; }
    }
  </script>
</body>
</html>
